version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# RIFT — Autonomous CI/CD Healing Agent
# docker-compose.yml
#
# Services
# --------
# backend   FastAPI multi-agent orchestrator (port 8000)
# frontend  Nginx serving the pre-built React SPA (port 3000)
#
# Quick start
# -----------
#   cp .env.example .env      # fill in your tokens
#   docker compose up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─── Backend ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: rift_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Required — must be set in .env (or in CI secrets)
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Optional — default is 5; clamp 1-50
      MAX_RETRIES: ${MAX_RETRIES:-5}
    env_file:
      - .env
    volumes:
      # Docker-in-Docker: the backend spawns sandbox containers at runtime.
      # The socket is mounted read-write so the SDK can manage containers.
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent workspace so partial runs survive container restarts.
      - workspace_data:/app/backend/.workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - rift_net

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-build   # multi-stage: reuse the already-built dist
    container_name: rift_frontend
    restart: unless-stopped
    image: rift_frontend_dist     # tag for local use
    # Override the CMD to serve the static build with a lightweight nginx
    entrypoint: []
    command: >
      sh -c "
        apt-get update -qq && apt-get install -y --no-install-recommends nginx > /dev/null 2>&1;
        cp -r /app/frontend/dist /usr/share/nginx/html;
        nginx -g 'daemon off;'
      "
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - rift_net

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  workspace_data:
    driver: local

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  rift_net:
    driver: bridge
